<!DOCTYPE html>
<html lang="tr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duvardaki İz - Kurumsal Sanat</title>
    
    <!-- Tailwind CSS (Arayüz Tasarımı İçin) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        marquee: 'marquee 40s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(100vw)' },
                            '100%': { transform: 'translateX(-100%)' },
                        }
                    }
                }
            }
        };
    </script>

    <!-- React Bağımlılıklarının Çakışmasını Önleyen Import Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
            "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react"
        }
    }
    </script>

    <!-- React ve Babel (Bileşenlerin Tarayıcıda Çalışması İçin) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; }
        /* Özel animasyonların daha akıcı olması için */
        .fade-in { animation: fadeIn 0.7s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-500">
    
    <!-- Sitenin Yükleneceği Ana Konteyner -->
    <div id="root"></div>

    <!-- Uygulama Kodları (React) -->
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Mail, Phone, MapPin, Send, ExternalLink, Award, Users, ShieldCheck, FileUp, Palette, SprayCan, Building2, School, Brush, Zap, Sun, Info, LayoutGrid, Eraser, Download, Moon, Clock, Undo, SlidersHorizontal, Landmark, GraduationCap, ArrowLeftRight } from 'lucide-react';

        const Logo = () => (
          <div className="flex items-center gap-3 group cursor-pointer">
            <div className="relative w-8 h-8 flex items-center justify-center">
              <Palette className="absolute top-0 left-0 w-5 h-5 text-indigo-700 dark:text-indigo-400" />
              <SprayCan className="absolute bottom-0 right-0 w-5 h-5 text-slate-600 dark:text-slate-400" />
            </div>
            <span className="font-bold tracking-tighter uppercase font-serif text-xl text-slate-900 dark:text-white">Duvardaki İz</span>
          </div>
        );

        function App() {
          const [currentView, setCurrentView] = useState('home');
          const [theme, setTheme] = useState('light');

          const toggleTheme = () => {
              const newTheme = theme === 'light' ? 'dark' : 'light';
              setTheme(newTheme);
              if (newTheme === 'dark') {
                  document.documentElement.classList.add('dark');
              } else {
                  document.documentElement.classList.remove('dark');
              }
          };

          return (
            <div className={theme === 'dark' ? 'dark' : ''}>
              <div className="min-h-screen bg-[#F8FAFC] dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-500">
                
                <nav className="sticky top-0 z-50 bg-[#F8FAFC]/90 dark:bg-slate-950/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-8 py-6 flex justify-between items-center transition-colors">
                  <Logo />
                  <div className="hidden md:flex gap-6 lg:gap-8 font-bold text-[10px] uppercase tracking-widest text-slate-600 dark:text-slate-400 items-center">
                    <button onClick={() => setCurrentView('home')} className={`hover:text-indigo-900 dark:hover:text-indigo-400 transition-colors ${currentView === 'home' ? 'text-indigo-900 dark:text-indigo-400' : ''}`}>Anasayfa</button>
                    <button onClick={() => setCurrentView('hizmetler')} className={`hover:text-indigo-900 dark:hover:text-indigo-400 transition-colors ${currentView === 'hizmetler' ? 'text-indigo-900 dark:text-indigo-400' : ''}`}>Hizmetler</button>
                    
                    {/* YENİ EKLENEN DÖNÜŞÜM SEKMESİ */}
                    <button onClick={() => setCurrentView('donusum')} className={`hover:text-indigo-900 dark:hover:text-indigo-400 transition-colors flex items-center gap-1 ${currentView === 'donusum' ? 'text-indigo-900 dark:text-indigo-400' : ''}`}>
                        <ArrowLeftRight size={12} className="inline"/> Dönüşüm
                    </button>
                    
                    <button onClick={() => setCurrentView('projeler')} className={`hover:text-indigo-900 dark:hover:text-indigo-400 transition-colors ${currentView === 'projeler' ? 'text-indigo-900 dark:text-indigo-400' : ''}`}>Projeler</button>
                    <button onClick={() => setCurrentView('referanslar')} className={`hover:text-indigo-900 dark:hover:text-indigo-400 transition-colors ${currentView === 'referanslar' ? 'text-indigo-900 dark:text-indigo-400' : ''}`}>Referanslar</button>
                    <button onClick={() => setCurrentView('iletisim')} className={`hover:text-indigo-900 dark:hover:text-indigo-400 transition-colors ${currentView === 'iletisim' ? 'text-indigo-900 dark:text-indigo-400' : ''}`}>İletişim</button>
                    <button onClick={() => setCurrentView('teklif')} className="border border-indigo-900 dark:border-indigo-400 px-4 py-2 hover:bg-indigo-900 hover:text-white dark:hover:bg-indigo-400 dark:hover:text-slate-950 transition-all">Teklif Al</button>
                    <button onClick={toggleTheme} className="p-2 bg-slate-200 dark:bg-slate-800 rounded-full hover:scale-110 transition-transform">
                      {theme === 'light' ? <Moon size={14} /> : <Sun size={14} />}
                    </button>
                  </div>
                </nav>

                <main className="min-h-[75vh] pb-20">
                  {currentView === 'home' && <HomeView />}
                  {currentView === 'hizmetler' && <HizmetlerView />}
                  {currentView === 'donusum' && <DonusumView />}  {/* YENİ GÖRÜNÜM */}
                  {currentView === 'projeler' && <ProjelerView />}
                  {currentView === 'referanslar' && <ReferanslarView />}
                  {currentView === 'iletisim' && <IletisimView />}
                  {currentView === 'teklif' && <TeklifView />}
                </main>

                {/* Piyasa Fiyat Şeridi (Sabit Alt) */}
                <div className="fixed bottom-0 w-full bg-indigo-900 dark:bg-indigo-950 text-white overflow-hidden py-2 border-t border-indigo-800 z-50">
                  <div className="whitespace-nowrap animate-marquee text-[10px] uppercase tracking-widest font-bold flex gap-12">
                    {[ "Dış Cephe Akrilik: 450 TL/Lt", "Endüstriyel Epoksi: 890 TL/Lt", "Anti-Graffiti Kaplama: 1200 TL/Lt", "UV Dayanıklı Vernik: 650 TL/Lt", "Su Bazlı Ekolojik: 520 TL/Lt", "Akrilik Astar: 320 TL/Lt", "Profesyonel Sprey: 190 TL/Adet", "Koruyucu Cila: 780 TL/Lt", "Tiner/Temizleyici: 240 TL/Lt", "Silikonlu Cephe: 480 TL/Lt", "Yol Çizgi Boyası: 560 TL/Lt", "Metal Koruma: 920 TL/Lt", "Ahşap Verniği: 410 TL/Lt", "Epoksi Astar: 740 TL/Lt" ].map((price, i) => (
                        <span key={i} className="flex items-center gap-2"> {i+1}. {price}</span>
                    ))}
                  </div>
                </div>

                <footer className="px-8 py-16 text-[10px] uppercase tracking-widest text-center border-t border-slate-200 dark:border-slate-800 mt-20 bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400">
                  © 2026 DUVARDAKİ İZ • ŞEHİR BİR TUVALDİR.
                </footer>
              </div>
            </div>
          );
        }

        // --- YENİ EKLENEN ÖNCESİ / SONRASI ETKİLEŞİMLİ BÖLÜM ---
        const DonusumView = () => {
            const [sliderPos, setSliderPos] = useState(50);
            const containerRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [activeIndex, setActiveIndex] = useState(0);

            // Farklı dönüşüm projelerini içeren veri dizisi
            const transformations = [
                { id: 1, title: "Merkez Trafo", src: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" },
                { id: 2, title: "Okul Duvarı", src: "https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" },
                { id: 3, title: "Sağır Cephe", src: "https://images.unsplash.com/photo-1561055657-b9e0bf0fa360?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" },
                { id: 4, title: "Sokak Merdiveni", src: "https://images.unsplash.com/photo-1517722014278-c256a91a6fba?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" },
                { id: 5, title: "Park Alanı", src: "https://images.unsplash.com/photo-1581454558552-87db98f26f74?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" }
            ];

            const handleMove = (event) => {
                if (!isDragging || !containerRef.current) return;
                const containerRect = containerRef.current.getBoundingClientRect();
                const clientX = event.touches ? event.touches[0].clientX : event.clientX;
                const x = clientX - containerRect.left;
                const percent = Math.max(0, Math.min(100, (x / containerRect.width) * 100));
                setSliderPos(percent);
            };

            const startDrag = (event) => {
                setIsDragging(true);
                handleMove(event);
            };

            const endDrag = () => {
                setIsDragging(false);
            };

            const activeImage = transformations[activeIndex].src;

            return (
                <section className="px-8 py-20 max-w-6xl mx-auto fade-in">
                    <div className="text-center mb-16">
                        <h1 className="text-4xl md:text-5xl font-bold mb-6 text-slate-900 dark:text-white uppercase tracking-tight">Gri'den Renge: Kentsel Dönüşüm</h1>
                        <p className="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto text-lg">Sıradan, soğuk ve yıpranmış beton yüzeylerin nasıl aidiyet hissi yaratan sanat eserlerine dönüştüğünü keşfedin. <strong className="text-indigo-900 dark:text-indigo-400">Ana görseldeki oku kaydırın ve alt kısımdan farklı projeleri seçin.</strong></p>
                    </div>

                    {/* İnteraktif Slider Konteyneri */}
                    <div 
                        ref={containerRef}
                        className="relative w-full aspect-video md:aspect-[21/9] rounded-2xl overflow-hidden cursor-ew-resize shadow-2xl select-none touch-none bg-slate-200 dark:bg-slate-800 transition-all duration-500"
                        onMouseMove={handleMove}
                        onMouseDown={startDrag}
                        onMouseUp={endDrag}
                        onMouseLeave={endDrag}
                        onTouchMove={handleMove}
                        onTouchStart={startDrag}
                        onTouchEnd={endDrag}
                    >
                        {/* ALT KATMAN: SONRASI (Renkli Sanat) */}
                        <img 
                            key={`after-${activeIndex}`}
                            src={activeImage} 
                            alt="Sonrası" 
                            className="absolute inset-0 w-full h-full object-cover pointer-events-none animate-[fadeIn_0.5s_ease-in-out]"
                            draggable="false"
                        />
                        <div className="absolute top-6 right-6 bg-indigo-600/90 text-white px-4 py-2 rounded font-bold tracking-widest uppercase text-xs backdrop-blur shadow-lg z-10">Sonrası</div>

                        {/* ÜST KATMAN: ÖNCESİ (Gri / Maskelenmiş) */}
                        <div 
                            className="absolute inset-0 w-full h-full pointer-events-none border-r-2 border-white/50 z-20"
                            style={{ clipPath: `polygon(0 0, ${sliderPos}% 0, ${sliderPos}% 100%, 0 100%)` }}
                        >
                            {/* Görseli CSS filtresi ile gri, mat ve eski bir duvar gibi gösteriyoruz */}
                            <img 
                                key={`before-${activeIndex}`}
                                src={activeImage} 
                                alt="Öncesi" 
                                className="absolute inset-0 w-full h-full object-cover grayscale brightness-75 contrast-75 sepia-[.2] animate-[fadeIn_0.5s_ease-in-out]"
                                draggable="false"
                            />
                            <div className="absolute inset-0 bg-slate-500/20 mix-blend-multiply"></div>
                            <div className="absolute top-6 left-6 bg-slate-900/80 text-white px-4 py-2 rounded font-bold tracking-widest uppercase text-xs backdrop-blur shadow-lg">Öncesi</div>
                        </div>

                        {/* KAYDIRMA ÇUBUĞU VE TUTAMAÇ */}
                        <div 
                            className="absolute top-0 bottom-0 w-1 bg-white shadow-[0_0_15px_rgba(0,0,0,0.5)] pointer-events-none flex justify-center items-center z-30"
                            style={{ left: `${sliderPos}%`, transform: 'translateX(-50%)' }}
                        >
                            <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-2xl text-indigo-900 ring-4 ring-white/30 transition-transform transform scale-100 hover:scale-110">
                                <ArrowLeftRight size={24} strokeWidth={2.5}/>
                            </div>
                        </div>
                    </div>

                    {/* YENİ: KÜÇÜK GÖRSELLER (THUMBNAILS) GALERİSİ */}
                    <div className="mt-8 flex flex-wrap justify-center gap-4">
                        {transformations.map((item, index) => (
                            <button 
                                key={item.id}
                                onClick={() => {
                                    setActiveIndex(index);
                                    setSliderPos(50); // Yeni görsel seçildiğinde slider'ı tekrar merkeze al
                                }}
                                className={`relative rounded-lg overflow-hidden w-24 h-16 md:w-32 md:h-20 transition-all duration-300 border-2 ${activeIndex === index ? 'border-indigo-600 scale-105 shadow-lg opacity-100' : 'border-transparent opacity-60 hover:opacity-100 hover:scale-105'}`}
                                title={item.title}
                            >
                                <img src={item.src} alt={item.title} className="w-full h-full object-cover" />
                                <div className={`absolute inset-0 bg-black/40 flex items-center justify-center transition-opacity ${activeIndex === index ? 'opacity-0' : 'opacity-100 hover:opacity-0'}`}></div>
                                {activeIndex === index && (
                                    <div className="absolute bottom-0 inset-x-0 bg-indigo-600 text-white text-[8px] font-bold uppercase tracking-widest text-center py-0.5">
                                        {item.title}
                                    </div>
                                )}
                            </button>
                        ))}
                    </div>

                    {/* Alt İstatistikler */}
                    <div className="mt-16 grid md:grid-cols-3 gap-8 text-center max-w-4xl mx-auto">
                        <div className="p-8 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:-translate-y-1 transition-transform">
                            <h4 className="text-4xl font-bold text-indigo-900 dark:text-indigo-400 mb-3">%100</h4>
                            <p className="text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-widest">Çevreye Uyum</p>
                        </div>
                        <div className="p-8 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:-translate-y-1 transition-transform">
                            <h4 className="text-4xl font-bold text-indigo-900 dark:text-indigo-400 mb-3">+1200</h4>
                            <p className="text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-widest">Memnun Vatandaş</p>
                        </div>
                        <div className="p-8 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:-translate-y-1 transition-transform">
                            <h4 className="text-4xl font-bold text-indigo-900 dark:text-indigo-400 mb-3">%85</h4>
                            <p className="text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-widest">Vandalizmde Düşüş</p>
                        </div>
                    </div>
                </section>
            );
        };
        // -------------------------------------------------------------

        const HomeView = () => {
          const canvasRef = useRef(null);
          const [isDrawing, setIsDrawing] = useState(false);
          const [color, setColor] = useState('#1e3a8a');
          const [brushSize, setBrushSize] = useState(4);
          const [undoStack, setUndoStack] = useState([]);

          const drawGrid = (ctx, width, height) => {
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, width, height);
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let x = 0; x <= width; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for (let y = 0; y <= height; y += 40) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }
          };

          const initCanvas = () => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            drawGrid(ctx, canvas.width, canvas.height);
          };

          useEffect(() => {
            initCanvas();
          }, []);

          const saveState = () => {
            const canvas = canvasRef.current;
            setUndoStack(prev => [...prev, canvas.toDataURL()]);
          };

          const handleUndo = () => {
            if (undoStack.length === 0) return;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const lastState = undoStack[undoStack.length - 1];
            setUndoStack(prev => prev.slice(0, -1));

            const img = new Image();
            img.src = lastState;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
          };

          const getCoordinates = (e) => {
            const canvas = canvasRef.current;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
              x: (clientX - rect.left) * scaleX,
              y: (clientY - rect.top) * scaleY
            };
          };

          const startDrawing = (e) => {
            saveState();
            setIsDrawing(true);
            const { x, y } = getCoordinates(e);
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.moveTo(x, y);
          };

          const draw = (e) => {
            if (!isDrawing) return;
            const { x, y } = getCoordinates(e);
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = color;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineTo(x, y);
            ctx.stroke();
          };

          const stopDrawing = () => {
            if (isDrawing) {
                setIsDrawing(false);
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.closePath();
            }
          };

          const downloadCanvas = () => {
            const link = document.createElement('a');
            link.download = 'duvardaki-iz-proje-taslagi.png';
            link.href = canvasRef.current.toDataURL();
            link.click();
          };

          const handleClear = () => {
            saveState();
            initCanvas();
          };

          return (
            <section className="px-8 py-20 max-w-5xl mx-auto fade-in">
                <h1 className="text-6xl md:text-8xl font-bold tracking-tighter leading-[0.9] mb-8 text-slate-900 dark:text-white">KENTSEL DOKUYU <br/> <span className="text-indigo-900 dark:text-indigo-400">SANATLA İYİLEŞTİRİYORUZ.</span></h1>
                <p className="max-w-xl text-lg font-light text-slate-600 dark:text-slate-400 italic tracking-wide mb-12">Belediyeler ve kurumlar için estetik, kalıcı ve nitelikli kentsel müdahaleler.</p>
                
                <div className="bg-white dark:bg-slate-900 p-6 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                        <div>
                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Dijital Taslak Alanı</h3>
                            <p className="text-[10px] text-slate-500 font-medium">Kendi proje vizyonunuzu çizin.</p>
                        </div>
                        
                        <div className="flex items-center gap-2 bg-slate-50 dark:bg-slate-800 p-2 rounded-lg border border-slate-200 dark:border-slate-700">
                            <div className="flex items-center gap-3 pr-3 border-r border-slate-200 dark:border-slate-600">
                                <input type="color" value={color} onChange={(e) => setColor(e.target.value)} className="w-8 h-8 rounded-full border border-slate-200 dark:border-slate-600 cursor-pointer p-0 bg-transparent" title="Renk Seçici" />
                                <div className="flex items-center gap-2" title="Fırça Kalınlığı">
                                    <SlidersHorizontal size={14} className="text-slate-400" />
                                    <input type="range" min="1" max="20" value={brushSize} onChange={(e) => setBrushSize(e.target.value)} className="w-20 accent-indigo-600 cursor-pointer" />
                                </div>
                            </div>
                            <button onClick={handleUndo} disabled={undoStack.length === 0} className="p-2 text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700 hover:text-indigo-600 dark:hover:text-indigo-400 rounded transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="Geri Al (Undo)"><Undo size={18}/></button>
                            <button onClick={handleClear} className="p-2 text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700 hover:text-red-500 dark:hover:text-red-400 rounded transition-colors" title="Tuvali Temizle"><Eraser size={18}/></button>
                            <button onClick={downloadCanvas} className="p-2 text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700 hover:text-indigo-600 dark:hover:text-indigo-400 rounded transition-colors" title="Cihaza İndir"><Download size={18}/></button>
                        </div>
                    </div>
                    
                    <div className="w-full overflow-hidden border border-slate-200 dark:border-slate-700 rounded-lg shadow-inner bg-[#f8fafc]" style={{ touchAction: 'none' }}>
                        <canvas 
                            ref={canvasRef} 
                            width={1000} 
                            height={400} 
                            onMouseDown={startDrawing} 
                            onMouseUp={stopDrawing} 
                            onMouseOut={stopDrawing}
                            onMouseMove={draw} 
                            onTouchStart={startDrawing}
                            onTouchEnd={stopDrawing}
                            onTouchMove={draw}
                            className="w-full h-auto cursor-crosshair touch-none" 
                        />
                    </div>
                    <div className="mt-3 flex justify-between items-center text-[10px] text-slate-400 font-medium uppercase tracking-wider">
                        <span>* Dokunmatik ekranlar (Mobil/Tablet) ile tam uyumludur.</span>
                        <span>1000x400 PX ÇÖZÜNÜRLÜK</span>
                    </div>
                </div>
            </section>
          );
        };

        const HizmetlerView = () => {
          const hizmetler = [
            { icon: <Zap/>, title: "1. Elektrik Trafoları", desc: "Kentsel dokuya uyumlu dönüşüm." },

            { icon: <LayoutGrid/>, title: "3. Üst Geçitler", desc: "Modern kent mobilyası entegrasyonu." },
